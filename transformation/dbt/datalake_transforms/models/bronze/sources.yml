version: 2

sources:
  - name: bronze
    database: bronze
    schema: bronze
    description: >
      Bronze layer — ClickHouse views reading directly from MinIO Parquet files
      written by Airbyte and the HTTP ingestion script. No transformation applied;
      data is as close to source as possible.

    # Freshness SLA: warn if source data is >25 hours old (pipeline runs at 06:00 UTC daily),
    # error if >49 hours old (missed two consecutive pipeline runs).
    freshness:
      warn_after: {count: 25, period: hour}
      error_after: {count: 49, period: hour}
    loaded_at_field: _airbyte_extracted_at

    tables:
      # ── MySQL (ShopFlow CDC) ─────────────────────────────────────────────
      - name: src_mysql_customers
        description: Raw customer records from MySQL shopflow.customers via Airbyte CDC
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}

      - name: src_mysql_orders
        description: Raw order records from MySQL shopflow.orders via Airbyte CDC
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}

      - name: src_mysql_products
        description: Raw product records from MySQL shopflow.products via Airbyte CDC
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}

      # ── SAP OData API ────────────────────────────────────────────────────
      - name: src_sap_vendors
        description: Vendor master data from SAP OData simulation API
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}

      - name: src_sap_purchase_orders
        description: Purchase order data from SAP OData simulation API
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}

      # ── JSONPlaceholder REST API ─────────────────────────────────────────
      - name: src_rest_users
        description: User records from JSONPlaceholder /users endpoint
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}

      - name: src_rest_posts
        description: Post records from JSONPlaceholder /posts (mapped to reviews)
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}

      - name: src_rest_comments
        description: Comment records from JSONPlaceholder /comments
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
