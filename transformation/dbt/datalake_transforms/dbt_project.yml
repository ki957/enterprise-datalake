name: 'datalake_transforms'
version: '1.0.0'
require-dbt-version: ">=1.7.0"

profile: 'datalake_transforms'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  datalake_transforms:

    # ── ShopFlow medallion stack ───────────────────────────────────────────────
    silver:
      +materialized: incremental
      +schema: staging

    gold:
      +materialized: table
      +schema: gold
      dimensions:
        +engine: "ReplacingMergeTree()"
      facts:
        +engine: "MergeTree()"

    # Source definition folders — no models, just sources.yml files
    bronze:
      +enabled: false
    raw:
      +enabled: false

    # ── SaaS stack ─────────────────────────────────────────────────────────────
    staging:
      +materialized: incremental
      +schema: staging

    marts:
      +materialized: table
      +schema: gold
