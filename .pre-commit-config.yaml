repos:

  # ── Standard file hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^infrastructure/docker/
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # ── Secret detection ──────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^\.env\.example$

  # ── Python linting ────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --ignore, "E501,E402,F401"]
        files: ^(orchestration|scripts|services|governance)/.*\.py$

  # ── YAML lint ─────────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, "{extends: default, rules: {line-length: {max: 200}, truthy: disable}}"]
        files: \.(yml|yaml)$
        exclude: ^\.github/

  # ── SQL lint (dbt models) ─────────────────────────────────────────────────
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.0.7
    hooks:
      - id: sqlfluff-lint
        args: [--dialect, clickhouse, --exclude-rules, "L016,L031,L034"]
        files: ^transformation/dbt/datalake_transforms/models/.*\.sql$
