name: datalake_checkpoint
config_version: 1.0
class_name: SimpleCheckpoint
run_name_template: "%Y%m%d-%H%M%S-datalake"

validations:
  - batch_request:
      datasource_name: clickhouse_gold
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: gold.fct_orders
    expectation_suite_name: gold_fct_orders

  - batch_request:
      datasource_name: clickhouse_gold
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: gold.dim_customers
    expectation_suite_name: gold_dim_customers

  - batch_request:
      datasource_name: clickhouse_gold
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: gold.fct_procurement
    expectation_suite_name: gold_fct_procurement

  - batch_request:
      datasource_name: clickhouse_staging
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: staging.stg_orders
    expectation_suite_name: staging_stg_orders
