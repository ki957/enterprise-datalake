networks:
  backend-net:
    external: true
    name: docker_backend-net
  frontend-net:
    external: true
    name: docker_frontend-net

volumes:
  clickhouse-data:
    external: true
    name: docker_clickhouse-data
  spark-data:
    external: true
    name: docker_spark-data

services:

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9002:9000"
      - "9363:9363"   # Prometheus metrics endpoint
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_USER: ${CLICKHOUSE_DEFAULT_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_DEFAULT_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ../../infrastructure/clickhouse/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
      - ../../infrastructure/clickhouse/performance.xml:/etc/clickhouse-server/config.d/performance.xml:ro
    networks:
      - backend-net
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"   # bind to localhost only — UI not exposed on 0.0.0.0
      - "7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: true
      # ACL enforcement: only users listed in spark.admin.acls can view all jobs/stages.
      # For full auth, place an authenticated reverse proxy in front of port 8081.
      SPARK_MASTER_OPTS: >-
        -Dspark.ui.acls.enable=true
        -Dspark.acls.enable=true
        -Dspark.admin.acls=admin
        -Dspark.ui.reverseProxy=true
    volumes:
      - spark-data:/opt/spark/work
    networks:
      - backend-net
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    restart: unless-stopped
    environment:
      SPARK_NO_DAEMONIZE: true
      SPARK_WORKER_MEMORY: 1536m
      SPARK_WORKER_CORES: "2"
    volumes:
      - spark-data:/opt/spark/work
    depends_on:
      - spark-master
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "2.0"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  dbt-docs:
    image: nginx:alpine
    container_name: dbt-docs
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ../../transformation/dbt/datalake_transforms/target:/usr/share/nginx/html:ro
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  spark-history:
    image: apache/spark:3.5.0
    container_name: spark-history
    restart: unless-stopped
    ports:
      - "18080:18080"
    environment:
      SPARK_NO_DAEMONIZE: true
      SPARK_HISTORY_OPTS: >-
        -Dspark.history.fs.logDirectory=s3a://logs/spark-events
        -Dspark.hadoop.fs.s3a.endpoint=http://minio:9000
        -Dspark.hadoop.fs.s3a.access.key=admin
        -Dspark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
        -Dspark.hadoop.fs.s3a.path.style.access=true
        -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
    volumes:
      - spark-data:/opt/spark/work
    networks:
      - backend-net
      - frontend-net
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
