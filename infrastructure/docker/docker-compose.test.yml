# Minimal test stack for integration tests.
# Used exclusively by CI (integration-tests job) and local integration testing.
# No volumes — all data is ephemeral.
#
# Start with:
#   docker compose -f infrastructure/docker/docker-compose.test.yml up -d
# Stop with:
#   docker compose -f infrastructure/docker/docker-compose.test.yml down

services:

  clickhouse-test:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: clickhouse-test
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_PASSWORD: test_password
    ports:
      - "18123:8123"
      - "19000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  postgres-test:
    image: postgres:15-alpine
    container_name: postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: saas_test
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_test"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
