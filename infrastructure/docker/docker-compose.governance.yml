networks:
  frontend-net:
    external: true
    name: docker_frontend-net
  backend-net:
    external: true
    name: docker_backend-net
  management-net:
    external: true
    name: docker_management-net

volumes:
  airflow-data:
    external: true
    name: docker_airflow-data

services:

  airflow-init:
    image: apache/airflow:2.8.0
    container_name: airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:Postgres@2024@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: l82azX1LorH_j3gdKvODS19mYePRjBvmjfqBIzhFvos=
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password Airflow@2024
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com
      "
    networks:
      - backend-net

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: airflow-webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:Postgres@2024@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: l82azX1LorH_j3gdKvODS19mYePRjBvmjfqBIzhFvos=
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: Airflow@2024secret
    volumes:
      - airflow-data:/opt/airflow
    depends_on:
      - airflow-init
    networks:
      - frontend-net
      - backend-net
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: airflow-scheduler
    restart: unless-stopped
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:Postgres@2024@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: l82azX1LorH_j3gdKvODS19mYePRjBvmjfqBIzhFvos=
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - airflow-data:/opt/airflow
    depends_on:
      - airflow-init
    networks:
      - backend-net
      - management-net
    command: scheduler
