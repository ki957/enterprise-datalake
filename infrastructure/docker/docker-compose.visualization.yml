networks:
  frontend-net:
    external: true
    name: docker_frontend-net
  backend-net:
    external: true
    name: docker_backend-net
  # Required for Superset → Keycloak SSO (server-side token exchange)
  keycloak-net:
    external: true
    name: docker_keycloak-net

volumes:
  superset-data:
    external: true
    name: docker_superset-data
  redis-data:
    external: true
    name: docker_redis-data

services:

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  superset:
    image: apache/superset:3.1.0
    container_name: superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - superset-data:/app/superset_home
      # Keycloak SSO config — mounted as a Python config file
      - ../../infrastructure/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      - redis
    networks:
      - frontend-net
      - backend-net
      - keycloak-net
    command: >
      bash -c "
        pip install clickhouse-sqlalchemy==0.2.4 --quiet &&
        superset db upgrade &&
        superset fab create-admin
          --username ${SUPERSET_ADMIN_USER}
          --firstname Admin --lastname User
          --email admin@example.com
          --password ${SUPERSET_ADMIN_PASSWORD} &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
