networks:
  frontend-net:
    external: true
    name: docker_frontend-net
  management-net:
    external: true
    name: docker_management-net
  backend-net:
    external: true
    name: docker_backend-net

volumes:
  prometheus-data:
    external: true
    name: docker_prometheus-data
  grafana-data:
    external: true
    name: docker_grafana-data
  loki-data:
    external: true
    name: docker_loki-data

services:

  loki:
    image: grafana/loki:2.9.3
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ../../infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks:
      - management-net
      - backend-net    # reachable from grafana (which is on backend-net + management-net)
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:2.9.3
    container_name: promtail
    restart: unless-stopped
    user: root   # needed to read /var/lib/docker/containers/
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ../../infrastructure/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    networks:
      - management-net
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ../../infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infrastructure/prometheus/alerts:/etc/prometheus/alerts:ro
    networks:
      - management-net
      - frontend-net
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ../../infrastructure/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - management-net
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://localhost:9093
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # ClickHouse datasource plugin — installed on first start
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource 4.0.2
      # ── Keycloak SSO (Generic OAuth2) ──────────────────────────────────────
      # Run `make setup-keycloak` once after `make security` to provision the
      # datalake realm and grafana OIDC client, then restart Grafana.
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "grafana-datalake-secret"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile"
      # Browser-facing redirect — must use the host-accessible Keycloak URL
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://localhost:8180/realms/datalake/protocol/openid-connect/auth"
      # Server-side token exchange — uses internal Docker hostname
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://keycloak:8080/realms/datalake/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://keycloak:8080/realms/datalake/protocol/openid-connect/userinfo"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(roles[*], 'admin') && 'Admin' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "preferred_username"
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "name"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - frontend-net
      - management-net
      - backend-net
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
