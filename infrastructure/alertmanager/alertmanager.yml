global:
  resolve_timeout: 5m

route:
  receiver: 'null'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts: repeat every hour
    - match:
        severity: critical
      receiver: 'null'
      repeat_interval: 1h
      # To enable Slack: change receiver to 'slack-critical' and set
      # SLACK_WEBHOOK_URL in .env, then add the slack_configs block below.

    # Warning alerts: batch and repeat every 4h
    - match:
        severity: warning
      receiver: 'null'
      repeat_interval: 4h

receivers:
  # Default sink: log-only (no external notification).
  # Replace with 'slack-critical' / 'slack-warning' once a webhook is configured.
  - name: 'null'

  # Uncomment and set SLACK_WEBHOOK_URL in .env to enable Slack notifications:
  # - name: slack-critical
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
  #       channel: '#data-alerts'
  #       title: '[CRITICAL] {{ .GroupLabels.alertname }}'
  #       text: |
  #         {{ range .Alerts }}
  #         *Alert:* {{ .Annotations.summary }}
  #         *Labels:* {{ range .Labels.SortedPairs }} {{ .Name }}={{ .Value }} {{ end }}
  #         {{ end }}
  #       send_resolved: true
  #
  # - name: slack-warning
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
  #       channel: '#data-alerts'
  #       title: '[WARNING] {{ .GroupLabels.alertname }}'
  #       text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
  #       send_resolved: false

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
