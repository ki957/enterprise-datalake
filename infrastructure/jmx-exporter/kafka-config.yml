startDelaySeconds: 30
ssl: false
lowercaseOutputName: true
lowercaseOutputLabelNames: true
rules:
  # Broker metrics
  - pattern: kafka.server<type=ReplicaManager, name=(\w+)><>Value
    name: kafka_replica_manager_$1
    type: GAUGE

  - pattern: kafka.server<type=BrokerTopicMetrics, name=(\w+)><>Count
    name: kafka_broker_topic_metrics_$1_total
    type: COUNTER

  - pattern: kafka.server<type=BrokerTopicMetrics, name=(\w+)><>OneMinuteRate
    name: kafka_broker_topic_metrics_$1_rate
    type: GAUGE

  - pattern: kafka.server<type=NetworkRequestMetrics, name=(\w+)><>Mean
    name: kafka_network_request_$1_mean_ms
    type: GAUGE

  # Log metrics
  - pattern: kafka.log<type=Log, name=(\w+), topic=(\w+), partition=(\w+)><>Value
    name: kafka_log_$1
    type: GAUGE
    labels:
      topic: "$2"
      partition: "$3"

  # Controller metrics
  - pattern: kafka.controller<type=KafkaController, name=(\w+)><>Value
    name: kafka_controller_$1
    type: GAUGE

  # Consumer group metrics (lag)
  - pattern: kafka.consumer<type=consumer-fetch-manager-metrics, client-id=(\w+)><>records-lag-max
    name: kafka_consumer_group_lag
    type: GAUGE
    labels:
      client_id: "$1"

  # Request handler metrics
  - pattern: kafka.server<type=Request, name=(\w+)><>Mean
    name: kafka_request_$1_mean_ms
    type: GAUGE

  - pattern: kafka.server<type=Request, name=(\w+)><>Count
    name: kafka_request_$1_total
    type: COUNTER

  # Producer metrics
  - pattern: kafka.server<type=Produce, name=(\w+)><>Mean
    name: kafka_produce_$1_mean_ms
    type: GAUGE

  - pattern: kafka.server<type=Fetch, name=(\w+)><>Mean
    name: kafka_fetch_$1_mean_ms
    type: GAUGE

  # Under-replicated partitions
  - pattern: kafka.server<type=ReplicaManager, name=UnderReplicatedPartitions><>Value
    name: kafka_under_replicated_partitions
    type: GAUGE

  # ISR shrink rate
  - pattern: kafka.server<type=ReplicaManager, name=IsrShrinksPerSec><>Value
    name: kafka_isr_shrinks_per_sec
    type: GAUGE

  # ISR expand rate
  - pattern: kafka.server<type=ReplicaManager, name=IsrExpandsPerSec><>Value
    name: kafka_isr_expands_per_sec
    type: GAUGE

  # Offset metrics
  - pattern: kafka.log<type=Log, name=LogEndOffset, topic=(.+), partition=(\d+)><>Value
    name: kafka_log_end_offset
    type: GAUGE
    labels:
      topic: "$1"
      partition: "$2"

  - pattern: kafka.log<type=Log, name=LogStartOffset, topic=(.+), partition=(\d+)><>Value
    name: kafka_log_start_offset
    type: GAUGE
    labels:
      topic: "$1"
      partition: "$2"
