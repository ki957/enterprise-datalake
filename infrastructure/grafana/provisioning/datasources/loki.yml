apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      # Correlate Loki logs with Grafana Explore using container/service labels
      derivedFields:
        - name: container
          matcherRegex: 'container="([^"]+)"'
          label: container
