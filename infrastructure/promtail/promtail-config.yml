server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 102400

scrape_configs:
  # Read container logs directly from Docker's JSON log files.
  # Avoids Docker API version incompatibility with docker_sd_configs.
  - job_name: docker-containers
    static_configs:
      - targets: ["localhost"]
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - labels:
          stream:
      - output:
          source: output
      - timestamp:
          source: time
          format: RFC3339Nano
    relabel_configs:
      # Extract container ID from the log path
      - source_labels: [__path__]
        regex: '.*/([a-f0-9]{12})[a-f0-9]*-json\.log'
        target_label: container_id
