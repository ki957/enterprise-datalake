mappings:
  - match: "airflow.dag_run.*"
    name: "airflow_dag_run_$1_total"
    match_type: regex
    labels:
      dag_id: "$2"
      state: "$1"

  - match: "airflow.task_run.*"
    name: "airflow_task_run_$1_total"
    match_type: regex
    labels:
      dag_id: "$2"
      task_id: "$3"
      state: "$1"

  - match: "airflow.task_duration.*"
    name: "airflow_task_duration_seconds"
    match_type: regex
    labels:
      dag_id: "$2"
      task_id: "$3"

  - match: "airflow.dag_processing.last_runtime.*"
    name: "airflow_dag_processing_last_runtime_seconds"
    match_type: regex
    labels:
      file: "$1"

  - match: "airflow.dag_processing.last_run.seconds_ago.*"
    name: "airflow_dag_processing_last_run_seconds_ago"
    match_type: regex
    labels:
      file: "$1"

  - match: "airflow.pool.open_slots.*"
    name: "airflow_pool_open_slots"
    match_type: regex
    labels:
      pool: "$1"

  - match: "airflow.pool.used_slots.*"
    name: "airflow_pool_used_slots"
    match_type: regex
    labels:
      pool: "$1"

  - match: "airflow.pool.starving_tasks.*"
    name: "airflow_pool_starving_tasks"
    match_type: regex
    labels:
      pool: "$1"

  - match: "airflow.executor.open_slots"
    name: "airflow_executor_open_slots"

  - match: "airflow.executor.queued_tasks"
    name: "airflow_executor_queued_tasks"

  - match: "airflow.executor.running_tasks"
    name: "airflow_executor_running_tasks"
