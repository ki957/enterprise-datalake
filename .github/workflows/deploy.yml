name: Deploy — Build & Push AI Agent Image

on:
  push:
    branches: [main]
    paths:
      - 'services/ai-agent/**'
      - 'services/ai-agent-v2/**'
      - 'infrastructure/docker/Dockerfile.airflow'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

# Only one deploy runs at a time — serialises releases to prevent race conditions
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/datalake-ai-agent

jobs:

  # ── 1. Build & push Docker image to GHCR ─────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push AI Agent image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: services/ai-agent
          file:    services/ai-agent/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Summary
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── 2. Build React frontend and attach as artifact ────────────────────────────
  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    needs: []   # runs in parallel with build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/ai-agent-v2/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: services/ai-agent-v2/frontend
        run: npm ci

      - name: Build production bundle
        working-directory: services/ai-agent-v2/frontend
        run: npm run build
        env:
          VITE_API_BASE: ''   # relative path — FastAPI serves static files

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: services/ai-agent-v2/frontend/dist/
          retention-days: 14

      - name: Frontend bundle size
        working-directory: services/ai-agent-v2/frontend
        run: |
          echo "## Frontend Build Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/ dist/assets/ 2>/dev/null || true
          du -sh dist/ dist/assets/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── 3. Smoke-test the pushed image ────────────────────────────────────────────
  smoke-test:
    name: Smoke Test Image
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and start container
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker run -d \
            --name ai-agent-smoke \
            -p 8502:8502 \
            -e GROQ_API_KEY=smoke-test-placeholder \
            -e POSTGRES_HOST=localhost \
            -e CLICKHOUSE_HOST=localhost \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sleep 8   # allow uvicorn to start

      - name: Health check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8502/api/health || echo "000")
          echo "HTTP status: $status"
          if [ "$status" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "⚠️  Health check returned $status (non-critical — DB not available in CI)"
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f ai-agent-smoke || true

  # ── 4. Deploy to staging ──────────────────────────────────────────────────────
  # Requires these repository secrets:
  #   DEPLOY_HOST     — SSH hostname or IP
  #   DEPLOY_USER     — SSH username
  #   DEPLOY_SSH_KEY  — private key (PEM format)

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [smoke-test, build-frontend]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: staging

    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: dist/

      - name: Copy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          source:   dist/
          target:   /tmp/datalake-dist/

      - name: Pull image and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/datalake
            mkdir -p services/ai-agent-v2/frontend/dist
            cp -r /tmp/datalake-dist/* services/ai-agent-v2/frontend/dist/
            rm -rf /tmp/datalake-dist
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker compose -f infrastructure/docker/docker-compose.ai-agent.yml up -d --force-recreate
            docker image prune -f
            sleep 10
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8502/api/health)
            if [ "$status" != "200" ]; then
              echo "ERROR: Health check failed after deploy (HTTP $status)"
              exit 1
            fi
            echo "Deployed ${{ github.sha }} at $(date -u)"

      - name: Deploy summary
        run: |
          echo "## Staging Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Host:** ${{ secrets.DEPLOY_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

  # ── 5. Deploy to production (manual approval required) ────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Pull image and restart production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_DEPLOY_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key:      ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          script: |
            cd /opt/datalake
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker compose -f infrastructure/docker/docker-compose.ai-agent.yml up -d --force-recreate
            docker image prune -f
            sleep 10
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8502/api/health)
            if [ "$status" != "200" ]; then
              echo "ERROR: Production health check failed (HTTP $status)"
              exit 1
            fi
            echo "Production deployed ${{ github.sha }} at $(date -u)"
