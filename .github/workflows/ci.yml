name: CI — Lint, Test, Validate, dbt Compile

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Secret scan ─────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install detect-secrets
        run: pip install detect-secrets==1.4.0

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --exclude-files '\.env\.example$' \
            --exclude-files '\.git/.*' \
            > .secrets.baseline.new
          # Fail if any HIGH severity secrets found (not just potential)
          python3 -c "
          import json, sys
          with open('.secrets.baseline.new') as f:
              data = json.load(f)
          results = data.get('results', {})
          total = sum(len(v) for v in results.values())
          if total > 0:
              print(f'Found {total} potential secret(s):')
              for path, secrets in results.items():
                  for s in secrets:
                      print(f'  {path}:{s[\"line_number\"]} [{s[\"type\"]}]')
              sys.exit(1)
          print('No secrets found.')
          "

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install \
            pytest==8.2.0 \
            pytest-mock==3.14.0 \
            faker==25.0.0 \
            mysql-connector-python==8.4.0 \
            psycopg2-binary==2.9.9

      - name: Run data generator + pipeline logic tests
        run: |
          pytest tests/test_data_generators.py tests/test_saas_pipeline_logic.py \
            -v --tb=short

      - name: DAG integrity checks (no Airflow DB needed)
        run: |
          pip install apache-airflow==2.8.0 --quiet
          pytest tests/test_dag_integrity.py -v --tb=short

  # ── 3. YAML validation ─────────────────────────────────────────────────────
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Lint YAML files
        run: |
          yamllint \
            --config-data "{extends: default, rules: {line-length: {max: 200}, truthy: disable}}" \
            infrastructure/docker/ \
            infrastructure/prometheus/ \
            infrastructure/grafana/ \
            orchestration/airflow/ \
            governance/great_expectations/

  # ── 3. Docker Compose validation ───────────────────────────────────────────
  compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env.example to .env for validation
        run: cp .env.example .env

      - name: Install Docker Compose
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y docker-compose-plugin

      - name: Validate all compose files
        run: |
          for f in infrastructure/docker/docker-compose.*.yml; do
            echo "Validating $f ..."
            docker compose --env-file .env -f "$f" config --quiet \
              && echo "  OK: $f" \
              || { echo "  FAIL: $f"; exit 1; }
          done

  # ── 4. Python linting ──────────────────────────────────────────────────────
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint Python files
        run: |
          ruff check \
            orchestration/airflow/dags/ \
            scripts/ \
            services/sap-api/ \
            services/ai-agent/ \
            governance/great_expectations/ \
            --ignore E501,E402,F401 \
            --target-version py311

  # ── 5. dbt compile + schema tests (no DB needed) ──────────────────────────
  dbt-compile:
    name: dbt Compile & Schema Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-clickhouse
        run: pip install dbt-clickhouse==1.10.0

      - name: Write CI dbt profile (no real DB — compile-only)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          datalake_transforms:
            target: ci
            outputs:
              ci:
                type: clickhouse
                host: localhost
                port: 8123
                user: default
                password: ci_placeholder
                schema: default
                secure: false
          EOF

      - name: dbt parse (validates all model SQL syntax)
        working-directory: transformation/dbt/datalake_transforms
        run: dbt parse --no-version-check

      - name: dbt compile (resolves all refs and sources)
        working-directory: transformation/dbt/datalake_transforms
        run: dbt compile --no-version-check
        # Note: compile-only — no DB connection needed. Full dbt run/test
        # requires a running ClickHouse instance (use the standalone runner DAG).

      - name: Validate schema.yml coverage
        working-directory: transformation/dbt/datalake_transforms
        run: |
          python3 - << 'EOF'
          import json, sys, os

          with open("target/manifest.json") as f:
              manifest = json.load(f)

          nodes = manifest.get("nodes", {})
          undocumented = []
          for key, node in nodes.items():
              if node.get("resource_type") != "model":
                  continue
              if node.get("schema") in ("default",):
                  continue  # skip example models
              if not node.get("columns"):
                  undocumented.append(f'{node["schema"]}.{node["name"]}')

          if undocumented:
              print(f"ERROR: {len(undocumented)} model(s) have no column-level docs in schema.yml:")
              for m in undocumented:
                  print(f"  {m}")
              print("Add column definitions to the relevant schema.yml file to fix this.")
              sys.exit(1)
          else:
              print(f"All {len(nodes)} models have column documentation.")
          EOF

  # ── 6. Integration tests ──────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (SaaS pipeline e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install integration test dependencies
        run: |
          pip install \
            pytest==8.2.0 \
            psycopg2-binary==2.9.9 \
            requests==2.31.0

      - name: Start test services
        run: |
          docker compose -f infrastructure/docker/docker-compose.test.yml up -d
          echo "Waiting for ClickHouse..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:18123/ping > /dev/null 2>&1; then
              echo "  ClickHouse ready (attempt $i)"
              break
            fi
            sleep 3
          done
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if docker exec postgres-test pg_isready -U postgres -d saas_test > /dev/null 2>&1; then
              echo "  PostgreSQL ready (attempt $i)"
              break
            fi
            sleep 3
          done

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          TEST_CLICKHOUSE_HOST: localhost
          TEST_CLICKHOUSE_PORT: "18123"
          TEST_CLICKHOUSE_USER: default
          TEST_CLICKHOUSE_PASSWORD: test_password
          TEST_POSTGRES_HOST: localhost
          TEST_POSTGRES_PORT: "15432"
          TEST_POSTGRES_USER: postgres
          TEST_POSTGRES_PASSWORD: test_password
          TEST_POSTGRES_DB: saas_test

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f infrastructure/docker/docker-compose.test.yml logs

      - name: Tear down test services
        if: always()
        run: docker compose -f infrastructure/docker/docker-compose.test.yml down

  # ── 6a. Data quality (Great Expectations) ────────────────────────────────
  data-quality:
    name: Data Quality (Great Expectations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Great Expectations + ClickHouse driver
        run: pip install great-expectations==0.18.0 clickhouse-sqlalchemy==0.2.4 clickhouse-driver==0.2.9

      - name: Start ClickHouse test container
        run: |
          docker compose -f infrastructure/docker/docker-compose.test.yml up -d clickhouse-test
          echo "Waiting for ClickHouse..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:18123/ping > /dev/null 2>&1; then
              echo "  ClickHouse ready (attempt $i)"
              break
            fi
            sleep 3
          done

      - name: Seed test data for GE validation
        run: |
          docker exec clickhouse-test clickhouse-client \
            --password test_password \
            --multiquery \
            < tests/fixtures/seed_ge_test_data.sql

      - name: Run Great Expectations checkpoint
        working-directory: governance/great_expectations
        run: python run_checkpoint.py
        env:
          CLICKHOUSE_DEFAULT_PASSWORD: test_password
          CLICKHOUSE_GE_HOST: localhost
          CLICKHOUSE_GE_NATIVE_PORT: "19000"

      - name: Tear down test container
        if: always()
        run: docker compose -f infrastructure/docker/docker-compose.test.yml down

  # ── 6b. Python SAST (bandit) ──────────────────────────────────────────────
  bandit-scan:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit==1.7.9

      - name: Run bandit security scan
        run: |
          bandit -r \
            orchestration/airflow/dags/ \
            scripts/ \
            services/ \
            -lll \
            --exclude services/ai-agent/.venv \
            -f txt

  # ── 6c. Python dependency vulnerability scan (pip-audit) ──────────────────
  pip-audit:
    name: Dependency Vulnerability Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit requirements-dev.txt
        run: |
          pip-audit -r requirements-dev.txt \
            --ignore-vuln PYSEC-2022-42974 \
            || true   # warn-only on first run

      - name: Audit AI agent requirements
        run: |
          pip-audit -r services/ai-agent/requirements.txt \
            || true   # warn-only on first run

  # ── 7. Container & dependency security scan (Trivy) ───────────────────────
  trivy-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan Airflow Dockerfile for misconfigurations
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: infrastructure/docker/Dockerfile.airflow
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0   # warn-only — change to 1 once baseline is established

      - name: Scan Python dependencies for known CVEs
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0   # warn-only
          skip-dirs: .git,node_modules,.venv

  # ── 8. SQL lint (sqlfluff) ─────────────────────────────────────────────────
  sql-lint:
    name: SQL Lint (sqlfluff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install sqlfluff==3.0.7 sqlfluff-templater-dbt==3.0.7 dbt-clickhouse==1.10.0

      - name: Write CI dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          datalake_transforms:
            target: ci
            outputs:
              ci:
                type: clickhouse
                host: localhost
                port: 8123
                user: default
                password: ci_placeholder
                schema: default
                secure: false
          EOF

      - name: Lint dbt SQL models
        working-directory: transformation/dbt/datalake_transforms
        run: |
          sqlfluff lint models/ \
            --dialect clickhouse \
            --templater dbt \
            --exclude-rules L016,L031,L034 \
            --warn-unused-ignores
